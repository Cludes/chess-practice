<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chess Practice - Best Move Trainer</title>
<style>
  :root {
    --light: #ebecd0;
    --dark: #739552;
    --sel: rgba(255, 235, 59, 0.55);
    --dest: rgba(0, 0, 0, 0.22);
    --last: rgba(255, 235, 59, 0.30);
    --bg: #2b2b2b;
    --panel: #363636;
    --text: #e8e8e8;
    --muted: #9aa0a6;
    --accent: #5b9bff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 16px;
  }
  h1 { font-size: 18px; margin: 0 0 2px; }
  .sub { color: var(--muted); font-size: 12px; margin-bottom: 14px; }
  .app { display: flex; gap: 18px; align-items: flex-start; flex-wrap: wrap; }

  .board-wrap { display: flex; gap: 8px; }
  .eval-bar {
    width: 16px; border-radius: 4px; overflow: hidden;
    background: #111; position: relative; align-self: stretch;
    display: flex; flex-direction: column-reverse;
  }
  .eval-fill { background: #f4f4f4; width: 100%; transition: height 0.25s ease; height: 50%; }
  .eval-num {
    position: absolute; left: 0; right: 0; text-align: center;
    font-size: 9px; font-weight: 700; color: #111; bottom: 2px; pointer-events: none;
  }

  .board {
    position: relative;
    width: min(78vw, 560px);
    height: min(78vw, 560px);
    touch-action: manipulation;
    user-select: none;
  }
  .grid { position: absolute; inset: 0; display: grid;
    grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr); }
  .sq { position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .sq.l { background: var(--light); }
  .sq.d { background: var(--dark); }
  .sq.sel::after { content: ""; position: absolute; inset: 0; background: var(--sel); }
  .sq.last::after { content: ""; position: absolute; inset: 0; background: var(--last); }
  .piece {
    font-size: min(9vw, 64px); line-height: 1; z-index: 2;
  }
  .piece.w { color: #fff; text-shadow: 0 0 2px #000, 0 1px 2px rgba(0,0,0,.6); }
  .piece.b { color: #1b1b1b; text-shadow: 0 0 1px rgba(255,255,255,.25); }
  .piece.drag { cursor: grab; }
  .dot { position: absolute; width: 28%; height: 28%; border-radius: 50%;
    background: var(--dest); z-index: 1; pointer-events: none; }
  .dot.capture { width: 86%; height: 86%; background: transparent;
    border: 6px solid var(--dest); border-radius: 50%; }
  .coord { position: absolute; font-size: 10px; font-weight: 700; opacity: .65; z-index: 3; pointer-events: none; }
  .coord.file { bottom: 1px; right: 3px; }
  .coord.rank { top: 1px; left: 3px; }
  svg.arrows { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 4; pointer-events: none; }

  .panel { background: var(--panel); border-radius: 10px; padding: 14px 16px;
    width: 312px; max-width: 92vw; }
  .evalline { font-size: 28px; font-weight: 800; margin: 0 0 6px; }

  .cands { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; max-height: 220px; overflow-y: auto; }
  .cand { display: flex; align-items: center; gap: 8px; font-size: 14px; }
  .cand .rank { color: var(--muted); font-size: 11px; min-width: 18px; text-align: right; }
  .cand .swatch { width: 11px; height: 11px; border-radius: 50%; flex: none; }
  .cand .mv { font-weight: 700; min-width: 56px; }
  .cand .ev { color: var(--muted); font-size: 12px; }

  .pv { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px;
    color: var(--muted); margin: 2px 0 0; line-height: 1.5; word-spacing: 2px; }
  .status { font-size: 12px; color: var(--muted); margin-top: 8px; min-height: 16px; }
  .turn { font-size: 13px; margin-top: 10px; }
  .turn b { color: #fff; }

  .gradebox { margin-top: 12px; padding: 10px; border-radius: 8px; background: #2f2f2f;
    display: none; }
  .gradebox.show { display: block; }
  .grade-last { font-size: 16px; font-weight: 800; }
  .grade-detail { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .grade-stats { font-size: 11px; color: var(--muted); margin-top: 7px; border-top: 1px solid #444; padding-top: 6px; }

  .controls { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 14px; }
  button {
    background: #4a4a4a; color: var(--text); border: 1px solid #5a5a5a;
    border-radius: 6px; padding: 7px 11px; font-size: 13px; cursor: pointer;
  }
  button:hover { background: #565656; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #06203f; font-weight: 700; }
  .opt { display: flex; align-items: center; gap: 8px; font-size: 12px; margin-top: 10px; color: var(--muted); }
  .opt input[type=range] { flex: 1; }
  .checks { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; font-size: 12px; }
  .checks label { display: flex; align-items: center; gap: 7px; cursor: pointer; }
  .checks select { background: #4a4a4a; color: var(--text); border: 1px solid #5a5a5a; border-radius: 5px; padding: 3px 5px; }

  .load { margin-top: 12px; }
  .load textarea { width: 100%; height: 54px; resize: vertical; background: #2f2f2f; color: var(--text);
    border: 1px solid #555; border-radius: 6px; padding: 6px; font-size: 11px;
    font-family: ui-monospace, Menlo, Consolas, monospace; }
  .load-row { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .load-status { font-size: 11px; color: var(--muted); margin-top: 5px; min-height: 14px; }

  .moves { margin-top: 12px; max-height: 130px; overflow-y: auto; font-size: 12px;
    font-family: ui-monospace, Menlo, Consolas, monospace; line-height: 1.7; color: #cfd2d6; }
  .moves .num { color: var(--muted); margin-right: 4px; }

  .promo { position: absolute; inset: 0; background: rgba(0,0,0,.55); z-index: 10;
    display: none; align-items: center; justify-content: center; }
  .promo.show { display: flex; }
  .promo-inner { background: #fff; border-radius: 10px; padding: 10px; display: flex; gap: 6px; }
  .promo-inner span { font-size: 44px; cursor: pointer; color: #1b1b1b; line-height: 1; }
  .promo-inner span:hover { transform: scale(1.12); }
</style>
</head>
<body>
<div>
  <h1>Chess Practice - Best Move Trainer</h1>
  <div class="sub">Drag or click to move both sides. The engine ranks the top moves (top three get arrows); turn on grading to score yours. Runs fully in your browser.</div>

  <div class="app">
    <div class="board-wrap">
      <div class="eval-bar"><div class="eval-fill" id="evalFill"></div><div class="eval-num" id="evalNum">0.0</div></div>
      <div class="board" id="board">
        <div class="grid" id="grid"></div>
        <svg class="arrows" id="arrows" viewBox="0 0 8 8" preserveAspectRatio="none">
          <defs>
            <marker id="ah0" markerWidth="3.2" markerHeight="3.2" refX="1.6" refY="1.6" orient="auto"><path d="M0,0 L3.2,1.6 L0,3.2 L1,1.6 Z" fill="#1e88ff"></path></marker>
            <marker id="ah1" markerWidth="3.2" markerHeight="3.2" refX="1.6" refY="1.6" orient="auto"><path d="M0,0 L3.2,1.6 L0,3.2 L1,1.6 Z" fill="#43a047"></path></marker>
            <marker id="ah2" markerWidth="3.2" markerHeight="3.2" refX="1.6" refY="1.6" orient="auto"><path d="M0,0 L3.2,1.6 L0,3.2 L1,1.6 Z" fill="#fb8c00"></path></marker>
          </defs>
        </svg>
        <div class="promo" id="promo"><div class="promo-inner" id="promoInner"></div></div>
      </div>
    </div>

    <div class="panel">
      <div class="evalline" id="evalLine">0.0</div>
      <div class="cands" id="cands"></div>
      <div class="pv" id="pv"></div>

      <div class="gradebox" id="gradeBox">
        <div class="grade-last" id="gradeLast">Make a move...</div>
        <div class="grade-detail" id="gradeDetail"></div>
        <div class="grade-stats" id="gradeStats"></div>
      </div>

      <div class="turn" id="turnInfo">White to move</div>
      <div class="status" id="status">Engine starting...</div>

      <div class="opt">
        <span>Think</span>
        <input type="range" id="thinkRange" min="200" max="3000" step="100" value="1000" />
        <span id="thinkVal">1.0s</span>
      </div>

      <div class="checks">
        <label><input type="checkbox" id="showArrow" checked /> Show candidate arrows</label>
        <label>Show moves:
          <select id="candSel">
            <option value="3">Top 3</option>
            <option value="5" selected>Top 5</option>
            <option value="8">Top 8</option>
            <option value="all">All legal</option>
          </select>
        </label>
        <label>Grade my moves:
          <select id="gradeSel">
            <option value="off">Off</option>
            <option value="w">White</option>
            <option value="b">Black</option>
            <option value="both">Both</option>
          </select>
        </label>
        <label><input type="checkbox" id="engW" /> Engine plays White</label>
        <label><input type="checkbox" id="engB" /> Engine plays Black</label>
      </div>

      <div class="controls">
        <button class="primary" id="newBtn">New game</button>
        <button id="undoBtn">Undo</button>
        <button id="flipBtn">Flip</button>
        <button id="playBestBtn">Play best</button>
      </div>

      <div class="load">
        <textarea id="loadInput" placeholder="Paste a FEN or a full PGN here..."></textarea>
        <div class="load-row">
          <button id="loadFenBtn">Load FEN</button>
          <button id="loadPgnBtn">Load PGN</button>
          <button id="copyFenBtn">Copy FEN</button>
        </div>
        <div class="load-status" id="loadStatus"></div>
      </div>

      <div class="moves" id="moves"></div>
    </div>
  </div>
</div>

<script type="module">
import { Chess } from './vendor/chess.js';

const FILES = ['a','b','c','d','e','f','g','h'];
const GLYPH = { p:'♟', n:'♞', b:'♝', r:'♜', q:'♛', k:'♚' };
const ARROWS = 3;              // how many top moves get an on-board arrow
const MAX_MULTIPV = 256;       // engine ranks every legal move (capped for safety)
const ARROW_COLORS = ['#1e88ff', '#43a047', '#fb8c00'];
const ARROW_WIDTH = [0.17, 0.13, 0.11];
const ARROW_OPACITY = [0.9, 0.7, 0.55];

const game = new Chess();
let orientation = 'w';
let selected = null;
let legalDests = [];
let lastMove = null;
let dragFrom = null;
let pendingFen = null;
let pendingPromo = null;       // {from,to} or {from,to,byEngine}

let curLines = {};             // multipv index -> info object (live)
let bestUci = null;            // best move (multipv 1) for arrows / play-best
let curEval = null;            // finalized analysis: {fen, whiteCp, bestUci, lines}

let candidateCount = 5;        // how many ranked moves to request/show (number or 'all')
let gradeMode = 'off';         // off | w | b | both
let pendingGrade = null;       // {fenBefore, mover, playedUci, pre}
let gradeStats = { n: 0, totalLoss: 0, best: 0 };

const $ = id => document.getElementById(id);
const grid = $('grid'), arrows = $('arrows');

/* ---------- Engine ---------- */
const engine = new Worker('./engine/stockfish.js');
let engineReady = false;
let thinkMs = 1000;

engine.onmessage = (e) => {
  const line = typeof e.data === 'string' ? e.data : (e.data && e.data.data) || '';
  if (line === 'uciok') { engine.postMessage('isready'); return; }
  if (line === 'readyok') { engineReady = true; analyse(); return; }

  if (line.startsWith('info') && line.includes(' pv ')) {
    const info = parseInfo(line);
    if (info) { curLines[info.mpv] = info; refreshAnalysisUI(); }
    return;
  }
  if (line.startsWith('bestmove')) onBestMove(line.split(' ')[1]);
};
engine.postMessage('uci');

function analyse() {
  if (!engineReady) return;
  curLines = {};
  bestUci = null;
  drawArrows();
  if (game.game_over()) { showGameOver(); return; }
  pendingFen = game.fen();
  $('status').textContent = 'Thinking...';
  const legalCount = game.moves().length;
  const want = candidateCount === 'all' ? MAX_MULTIPV : candidateCount;
  engine.postMessage('stop');
  engine.postMessage('setoption name MultiPV value ' + Math.min(legalCount, want));
  engine.postMessage('position fen ' + pendingFen);
  engine.postMessage('go movetime ' + thinkMs);
}

function onBestMove(uci) {
  if (pendingFen !== game.fen()) return;      // stale result, we already moved on
  $('status').textContent = '';
  const l1 = curLines[1];
  bestUci = l1 ? l1.firstUci : (uci && uci !== '(none)' ? uci : null);
  curEval = { fen: pendingFen, whiteCp: l1 ? l1.cp : 0, bestUci, lines: { ...curLines } };
  refreshAnalysisUI();
  resolvePendingGrade();

  const turn = game.turn();
  if (bestUci && ((turn === 'w' && $('engW').checked) || (turn === 'b' && $('engB').checked))) {
    applyUci(bestUci, true);
  }
}

function parseInfo(line) {
  const t = line.split(/\s+/);
  const mpvIdx = t.indexOf('multipv');
  const mpv = mpvIdx !== -1 ? parseInt(t[mpvIdx + 1], 10) : 1;
  const pvIdx = t.indexOf('pv');
  if (pvIdx === -1) return null;
  const pvUci = t.slice(pvIdx + 1);
  if (!pvUci.length || !uciToSan(game.fen(), pvUci[0])) return null;   // illegal -> stale, ignore

  let cp = null, mate = null;
  const si = t.indexOf('score');
  if (si !== -1) {
    if (t[si + 1] === 'cp') cp = parseInt(t[si + 2], 10);
    else if (t[si + 1] === 'mate') mate = parseInt(t[si + 2], 10);
  }
  const sign = game.turn() === 'w' ? 1 : -1;   // score is side-to-move relative
  let scoreText, whiteCp;
  if (mate !== null) {
    const m = sign * mate;
    scoreText = (m > 0 ? '+' : '-') + 'M' + Math.abs(mate);
    whiteCp = m > 0 ? 100000 - Math.abs(mate) : -100000 + Math.abs(mate);
  } else {
    whiteCp = sign * cp;
    scoreText = (whiteCp >= 0 ? '+' : '') + (whiteCp / 100).toFixed(2);
  }
  return { mpv, cp: whiteCp, scoreText, firstUci: pvUci[0], firstSan: uciToSan(game.fen(), pvUci[0]), pvSan: pvToSan(game.fen(), pvUci, 8) };
}

/* ---------- uci <-> san ---------- */
function applyUciOn(tmp, uci) {
  return tmp.move({ from: uci.slice(0, 2), to: uci.slice(2, 4), promotion: uci.length > 4 ? uci[4] : undefined });
}
function uciToSan(fen, uci) {
  const tmp = new Chess(fen);
  const m = applyUciOn(tmp, uci);
  return m ? m.san : null;
}
function pvToSan(fen, pvUci, max) {
  const tmp = new Chess(fen);
  const out = [];
  let moveNum = parseInt(fen.split(' ')[5], 10);
  let white = tmp.turn() === 'w';
  for (let i = 0; i < pvUci.length && i < max; i++) {
    const m = applyUciOn(tmp, pvUci[i]);
    if (!m) break;
    if (white) out.push(moveNum + '.' + m.san);
    else { out.push(m.san); moveNum++; }
    white = !white;
  }
  return out.join(' ');
}

/* ---------- Analysis UI ---------- */
function refreshAnalysisUI() {
  const l1 = curLines[1];
  if (l1) {
    $('evalLine').textContent = l1.scoreText;
    $('evalNum').textContent = l1.scoreText;
    $('pv').textContent = l1.pvSan || '';
    bestUci = l1.firstUci;
    const clamped = Math.max(-1000, Math.min(1000, l1.cp));
    $('evalFill').style.height = (50 + clamped / 1000 * 50) + '%';
  }
  showCandidates();
  drawArrows();
}
function showCandidates() {
  const box = $('cands');
  box.innerHTML = '';
  const idxs = Object.keys(curLines).map(Number).sort((a, b) => a - b);
  for (const i of idxs) {
    const l = curLines[i];
    if (!l) continue;
    const row = document.createElement('div');
    row.className = 'cand';
    const color = i <= ARROWS ? ARROW_COLORS[i - 1] : '#666';
    row.innerHTML = '<span class="rank">' + i + '</span>' +
      '<span class="swatch" style="background:' + color + '"></span>' +
      '<span class="mv">' + (l.firstSan || '') + '</span><span class="ev">' + l.scoreText + '</span>';
    box.appendChild(row);
  }
}
function showGameOver() {
  let msg = 'Game over';
  if (game.in_checkmate()) msg = (game.turn() === 'w' ? 'Black' : 'White') + ' wins by checkmate';
  else if (game.in_stalemate()) msg = 'Draw - stalemate';
  else if (game.in_threefold_repetition()) msg = 'Draw - repetition';
  else if (game.insufficient_material()) msg = 'Draw - insufficient material';
  else if (game.in_draw()) msg = 'Draw - fifty-move rule';
  $('status').textContent = msg;
  $('cands').innerHTML = '';
  $('pv').textContent = '';
}

/* ---------- Board rendering ---------- */
function render() {
  grid.innerHTML = '';
  const ranks = orientation === 'w' ? [8,7,6,5,4,3,2,1] : [1,2,3,4,5,6,7,8];
  const files = orientation === 'w' ? FILES : [...FILES].reverse();
  for (const r of ranks) {
    for (const f of files) {
      const sq = f + r;
      const light = (FILES.indexOf(f) + r) % 2 === 1;
      const cell = document.createElement('div');
      cell.className = 'sq ' + (light ? 'l' : 'd');
      cell.dataset.square = sq;
      if (selected === sq) cell.classList.add('sel');
      if (lastMove && (lastMove.from === sq || lastMove.to === sq)) cell.classList.add('last');

      const piece = game.get(sq);
      if (piece) {
        const span = document.createElement('span');
        span.className = 'piece ' + piece.color;
        span.textContent = GLYPH[piece.type];
        if (piece.color === game.turn() && !game.game_over()) {
          span.classList.add('drag');
          span.draggable = true;
          span.addEventListener('dragstart', (e) => onDragStart(e, sq));
          span.addEventListener('dragend', onDragEnd);
        }
        cell.appendChild(span);
      }
      const dest = legalDests.find(d => d.to === sq);
      if (dest) { const dot = document.createElement('div'); dot.className = 'dot' + (dest.capture ? ' capture' : ''); cell.appendChild(dot); }

      if (f === files[0]) { const c = document.createElement('span'); c.className = 'coord rank'; c.textContent = r; cell.appendChild(c); }
      if (r === ranks[ranks.length - 1]) { const c = document.createElement('span'); c.className = 'coord file'; c.textContent = f; cell.appendChild(c); }

      cell.addEventListener('click', () => onSquareClick(sq));
      cell.addEventListener('dragover', (e) => e.preventDefault());
      cell.addEventListener('drop', (e) => onDrop(e, sq));
      grid.appendChild(cell);
    }
  }
  updateTurn();
  renderMoves();
  drawArrows();
}

function squareCenter(sq) {
  const fi = FILES.indexOf(sq[0]);
  const ri = parseInt(sq[1], 10) - 1;
  const x = orientation === 'w' ? fi + 0.5 : (7 - fi) + 0.5;
  const y = orientation === 'w' ? (7 - ri) + 0.5 : ri + 0.5;
  return { x, y };
}
function drawArrows() {
  [...arrows.querySelectorAll('line')].forEach(l => l.remove());
  if (!$('showArrow').checked) return;
  for (let i = ARROWS; i >= 1; i--) {     // draw best last so it sits on top
    const l = curLines[i];
    if (!l || !l.firstUci) continue;
    const a = squareCenter(l.firstUci.slice(0, 2));
    const b = squareCenter(l.firstUci.slice(2, 4));
    const dx = b.x - a.x, dy = b.y - a.y, len = Math.hypot(dx, dy) || 1;
    const bx = b.x - (dx / len) * 0.32, by = b.y - (dy / len) * 0.32;
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', a.x); line.setAttribute('y1', a.y);
    line.setAttribute('x2', bx); line.setAttribute('y2', by);
    line.setAttribute('stroke', ARROW_COLORS[i - 1]);
    line.setAttribute('stroke-width', ARROW_WIDTH[i - 1]);
    line.setAttribute('stroke-linecap', 'round');
    line.setAttribute('opacity', ARROW_OPACITY[i - 1]);
    line.setAttribute('marker-end', 'url(#ah' + (i - 1) + ')');
    arrows.appendChild(line);
  }
}

function updateTurn() {
  const t = game.turn() === 'w' ? 'White' : 'Black';
  let extra = game.in_check() ? ' (check)' : '';
  $('turnInfo').innerHTML = game.game_over() ? '<b>Game over</b>' : ('<b>' + t + '</b> to move' + extra);
}
function renderMoves() {
  const h = game.history();
  let html = '';
  for (let i = 0; i < h.length; i += 2)
    html += '<span><span class="num">' + (i / 2 + 1) + '.</span>' + h[i] + (h[i + 1] ? ' ' + h[i + 1] : '') + '</span> ';
  const box = $('moves'); box.innerHTML = html; box.scrollTop = box.scrollHeight;
}

/* ---------- Click interaction ---------- */
function onSquareClick(sq) {
  if (pendingPromo || game.game_over()) return;
  const piece = game.get(sq);
  if (selected) {
    if (legalDests.find(d => d.to === sq)) { tryMove(selected, sq); return; }
    if (piece && piece.color === game.turn()) selectSquare(sq);
    else clearSelection();
    return;
  }
  if (piece && piece.color === game.turn()) selectSquare(sq);
}
function selectSquare(sq) {
  selected = sq;
  legalDests = destsFor(sq);
  render();
}
function clearSelection() { selected = null; legalDests = []; render(); }
function destsFor(sq) {
  return game.moves({ square: sq, verbose: true }).map(m => ({ to: m.to, capture: !!(m.flags && (m.flags.includes('c') || m.flags.includes('e'))) }));
}

/* ---------- Drag interaction (no re-render mid-drag) ---------- */
function onDragStart(e, sq) {
  if (pendingPromo || game.game_over()) { e.preventDefault(); return; }
  selected = null; legalDests = [];
  grid.querySelectorAll('.sq.sel').forEach(c => c.classList.remove('sel'));
  grid.querySelectorAll('.dot').forEach(d => d.remove());
  dragFrom = sq;
  const dests = destsFor(sq);
  grid.querySelectorAll('.sq').forEach(c => {
    if (c.dataset.square === sq) c.classList.add('sel');
    const d = dests.find(x => x.to === c.dataset.square);
    if (d) { const dot = document.createElement('div'); dot.className = 'dot' + (d.capture ? ' capture' : ''); c.appendChild(dot); }
  });
  e.dataTransfer.setData('text/plain', sq);
  e.dataTransfer.effectAllowed = 'move';
}
function onDrop(e, sq) {
  e.preventDefault();
  const from = dragFrom; dragFrom = null;
  clearDragHighlights();
  if (from && sq && from !== sq) tryMove(from, sq);
}
function onDragEnd() { dragFrom = null; clearDragHighlights(); }
function clearDragHighlights() {
  grid.querySelectorAll('.sq.sel').forEach(c => c.classList.remove('sel'));
  grid.querySelectorAll('.dot').forEach(d => d.remove());
}

/* ---------- Moving ---------- */
function tryMove(from, to) {
  const moves = game.moves({ square: from, verbose: true }).filter(m => m.to === to);
  if (!moves.length) return;
  if (moves.some(m => m.promotion)) { pendingPromo = { from, to }; showPromo(game.turn()); return; }
  doMove({ from, to });
}
function doMove(moveObj, byEngine) {
  const fenBefore = game.fen();
  const mover = game.turn();
  const m = game.move(moveObj);
  if (!m) return;

  if (!byEngine && shouldGrade(mover)) {
    const pre = (curEval && curEval.fen === fenBefore) ? curEval
              : (curLines[1] && pendingFen === fenBefore)
                ? { fen: fenBefore, whiteCp: curLines[1].cp, bestUci: curLines[1].firstUci }
                : null;
    pendingGrade = { fenBefore, mover, playedUci: m.from + m.to + (m.promotion || ''), pre };
    $('gradeLast').textContent = 'Checking...';
    $('gradeDetail').textContent = '';
  }

  lastMove = { from: m.from, to: m.to };
  selected = null; legalDests = [];
  render();
  analyse();
}
function applyUci(uci, byEngine) {
  doMove({ from: uci.slice(0, 2), to: uci.slice(2, 4), promotion: uci.length > 4 ? uci[4] : undefined }, byEngine);
}

/* ---------- Promotion picker ---------- */
function showPromo(color) {
  const inner = $('promoInner'); inner.innerHTML = '';
  for (const p of ['q', 'r', 'b', 'n']) {
    const s = document.createElement('span');
    s.textContent = GLYPH[p];
    s.style.color = color === 'w' ? '#5a5a5a' : '#1b1b1b';
    s.addEventListener('click', () => {
      const mv = { ...pendingPromo, promotion: p };
      pendingPromo = null; $('promo').classList.remove('show');
      doMove(mv);
    });
    inner.appendChild(s);
  }
  $('promo').classList.add('show');
}

/* ---------- Grading ---------- */
function shouldGrade(mover) { return gradeMode === 'both' || gradeMode === mover; }

function resolvePendingGrade() {
  if (!pendingGrade) return;
  if (curEval.fen !== game.fen()) return;            // not the post-move eval yet
  const g = pendingGrade; pendingGrade = null;
  if (!g.pre) { $('gradeLast').textContent = 'No eval (move a little slower)'; $('gradeDetail').textContent = ''; return; }

  const afterWhiteCp = curEval.whiteCp;              // eval of resulting position
  const moverSign = g.mover === 'w' ? 1 : -1;
  let cpLoss = moverSign * (g.pre.whiteCp - afterWhiteCp);
  if (cpLoss < 0) cpLoss = 0;
  const isBest = g.playedUci === g.pre.bestUci;

  const grade = classify(cpLoss, isBest);
  $('gradeLast').textContent = grade.label;
  $('gradeLast').style.color = grade.color;
  const playedSan = uciToSan(g.fenBefore, g.playedUci) || g.playedUci;
  const bestSan = uciToSan(g.fenBefore, g.pre.bestUci) || g.pre.bestUci;
  let detail = 'You played ' + playedSan + '.';
  if (!isBest) detail += ' Best was ' + bestSan + ' (-' + cpLoss + 'cp).';
  $('gradeDetail').textContent = detail;

  gradeStats.n++;
  gradeStats.totalLoss += Math.min(cpLoss, 1000);
  if (isBest) gradeStats.best++;
  const avg = Math.round(gradeStats.totalLoss / gradeStats.n);
  $('gradeStats').textContent = 'Graded ' + gradeStats.n + ' move' + (gradeStats.n === 1 ? '' : 's') +
    ' · avg loss ' + avg + 'cp · best ' + gradeStats.best + ' (' + Math.round(gradeStats.best / gradeStats.n * 100) + '%)';
}
function classify(cpLoss, isBest) {
  if (isBest) return { label: 'Best move!', color: '#69c267' };
  if (cpLoss <= 10) return { label: 'Excellent', color: '#69c267' };
  if (cpLoss <= 25) return { label: 'Great', color: '#83c25a' };
  if (cpLoss <= 50) return { label: 'Good', color: '#b6c34f' };
  if (cpLoss <= 100) return { label: 'Inaccuracy', color: '#e6b800' };
  if (cpLoss <= 200) return { label: 'Mistake', color: '#e8842b' };
  return { label: 'Blunder', color: '#e05a4f' };
}
function resetGrading() {
  pendingGrade = null;
  gradeStats = { n: 0, totalLoss: 0, best: 0 };
  $('gradeLast').textContent = 'Make a move...';
  $('gradeLast').style.color = '';
  $('gradeDetail').textContent = '';
  $('gradeStats').textContent = '';
}

/* ---------- Load / reset ---------- */
function afterLoadOrReset() {
  const h = game.history({ verbose: true });
  lastMove = h.length ? { from: h[h.length - 1].from, to: h[h.length - 1].to } : null;
  selected = null; legalDests = []; bestUci = null; curEval = null; curLines = {};
  resetGrading();
  render();
  analyse();
}

/* ---------- Controls ---------- */
$('newBtn').addEventListener('click', () => { game.reset(); afterLoadOrReset(); });
$('undoBtn').addEventListener('click', () => { if (game.history().length) { game.undo(); afterLoadOrReset(); } });
$('flipBtn').addEventListener('click', () => { orientation = orientation === 'w' ? 'b' : 'w'; render(); });
$('playBestBtn').addEventListener('click', () => { if (bestUci) applyUci(bestUci, false); });
$('showArrow').addEventListener('change', drawArrows);
$('candSel').addEventListener('change', (e) => { candidateCount = e.target.value === 'all' ? 'all' : parseInt(e.target.value, 10); analyse(); });
$('thinkRange').addEventListener('input', (e) => { thinkMs = parseInt(e.target.value, 10); $('thinkVal').textContent = (thinkMs / 1000).toFixed(1) + 's'; });
$('gradeSel').addEventListener('change', (e) => {
  gradeMode = e.target.value;
  $('gradeBox').classList.toggle('show', gradeMode !== 'off');
  if (gradeMode !== 'off') resetGrading();
});
$('engW').addEventListener('change', () => { if ($('engW').checked && game.turn() === 'w' && bestUci) applyUci(bestUci, true); });
$('engB').addEventListener('change', () => { if ($('engB').checked && game.turn() === 'b' && bestUci) applyUci(bestUci, true); });

$('loadFenBtn').addEventListener('click', () => {
  const fen = $('loadInput').value.trim();
  if (!fen) return;
  if (game.load(fen)) { $('loadStatus').textContent = 'Position loaded.'; afterLoadOrReset(); }
  else $('loadStatus').textContent = 'Invalid FEN.';
});
$('loadPgnBtn').addEventListener('click', () => {
  const pgn = $('loadInput').value.trim();
  if (!pgn) return;
  if (game.load_pgn(pgn)) { $('loadStatus').textContent = 'PGN loaded (' + game.history().length + ' half-moves).'; afterLoadOrReset(); }
  else $('loadStatus').textContent = 'Could not parse PGN.';
});
$('copyFenBtn').addEventListener('click', async () => {
  try { await navigator.clipboard.writeText(game.fen()); $('loadStatus').textContent = 'FEN copied to clipboard.'; }
  catch { $('loadInput').value = game.fen(); $('loadStatus').textContent = 'FEN placed in the box above.'; }
});

render();
</script>
</body>
</html>
